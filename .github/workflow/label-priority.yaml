name: Auto Label Priority
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  apply-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Issue Form
        id: parse
        uses: edumserrano/github-issue-forms-parser@v1
        with:
          template-filepath: '.github/ISSUE_TEMPLATE/bug-report.yaml'
          issue-form-body: '${{ github.event.issue.body }}'

      - name: Apply Priority Label
        uses: actions/github-script@v6
        with:
          script: |
            const configData = JSON.parse('${{ steps.parse.outputs.parsed-issue-form }}');
            const priority = configData.priority; // matches the id from your dropdown

            if (priority) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [priority.toLowerCase()]
              });
            }