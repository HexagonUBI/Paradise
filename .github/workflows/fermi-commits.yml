name: GitHub-Spacebar

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send commit notification to Spacebar
        env:
          WEBHOOK_URL: ${{ secrets.FERMI_WEBHOOK }}
          EVENT_JSON: ${{ toJson(github.event) }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          PUSHER: ${{ github.actor }}
          COMPARE: ${{ github.event.compare }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "❌ ERROR: FERMI_WEBHOOK secret is missing or empty!"
            exit 1
          fi

          TARGET_URL="${WEBHOOK_URL}?wait=true"

          COMMITS=$(echo "$EVENT_JSON" | jq -r '.commits // [] | map("• " + .author.name + ": " + (.message | split("\n")[0]) + " (`" + .id[0:7] + "`)") | join("\n")')

          if [ -z "$COMMITS" ]; then
            COMMITS="_No commit details available_"
          fi

          MESSAGE=$(cat <<EOF
          **Commit Push**

          **Repository:** $REPO
          **Branch:** $BRANCH
          **Pushed by:** $PUSHER

          **Commits:**
          $COMMITS

          $COMPARE
          EOF
          )

          # Explicitly setting avatar_url bypasses Spacebar's broken internal avatar resolution
          PAYLOAD=$(jq -n \
            --arg content "$MESSAGE" \
            --arg username "Fermi Commit Tracker" \
            --arg avatar_url "https://github.githubassets.com/favicons/favicon.png" \
            '{username: $username, content: $content, avatar_url: $avatar_url}')

          echo "Sending payload to Spacebar..."

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$TARGET_URL" \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-Spacebar-Webhook/1.0" \
            -d "$PAYLOAD")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS/d')

          echo "Response Body: $BODY"
          echo "HTTP Status Code: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 204 ]; then
            echo "❌ Failed to send webhook! HTTP Status: $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Webhook successfully sent to Spacebar!"