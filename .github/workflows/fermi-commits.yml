name: Commit Tracker (Spacebar)

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Spacebar notification
        env:
          FERMI_WEBHOOK: ${{ secrets.FERMI_WEBHOOK }}
        run: |
          COMMITS=$(jq -r '.commits[] |
            "- \(.author.name): \(.message) (`" + (.id[0:7]) + "`)"
          ' "$GITHUB_EVENT_PATH")

          MESSAGE=$(cat <<EOF
📦 **New Push**

**Repository:** ${{ github.repository }}
**Branch:** ${GITHUB_REF#refs/heads/}
**Pushed by:** ${{ github.actor }}

**Commits:**
$COMMITS

🔗 ${{ github.event.compare }}
EOF
)

          curl \
            --fail-with-body \
            --show-error \
            --silent \
            --write-out "\nHTTP %{http_code}\n" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$MESSAGE" '{content:$content}')" \
            "$FERMI_WEBHOOK"