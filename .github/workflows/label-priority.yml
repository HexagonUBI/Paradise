name: Auto Label Priority

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  apply-priority-label:
    runs-on: ubuntu-latest

    steps:
      - name: Apply priority label
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.issue.body || "";

            console.log("===== ISSUE BODY =====");
            console.log(body);
            console.log("======================");

            // Match:
            // ### Priority
            // critical
            const match = body.match(/###\s*Priority\s*\r?\n+([^\r\n]+)/i);

            if (!match) {
              console.log("Priority section not found.");
              return;
            }

            const priority = match[1].trim().toLowerCase();

            console.log(`Detected priority: ${priority}`);

            const valid = ["critical", "major", "minor"];

            if (!valid.includes(priority)) {
              console.log("Priority is not one of the expected labels.");
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [priority]
            });

            console.log(`Applied label: ${priority}`);