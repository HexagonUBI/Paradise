name: Auto Label Priority
on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  apply-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse Issue Form
        id: parse
        uses: edumserrano/github-issue-forms-parser@v1
        with:
          template-filepath: '.github/ISSUE_TEMPLATE/bug-report.yaml' 
          issue-form-body: '${{ github.event.issue.body }}'

      - name: Apply Priority Label
        uses: actions/github-script@v7
        env:
          # Passing the parsed data safely via an environment variable
          PARSED_DATA: ${{ steps.parse.outputs.parsed-issue-form }}
        with:
          script: |
            const rawData = process.env.PARSED_DATA;
            if (!rawData) {
              console.log("No form data found.");
              return;
            }
            
            const configData = JSON.parse(rawData);
            const priority = configData.priority; 
            
            if (priority) {
              console.log(`Applying label: ${priority.toLowerCase()}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [priority.toLowerCase()]
              });
            } else {
              console.log("No priority selection detected in this issue.");
            }