- name: Apply priority label
  uses: actions/github-script@v8
  env:
    PARSED_DATA: ${{ steps.parser.outputs.parsed-issue }}
  with:
    script: |
      const rawData = process.env.PARSED_DATA;

      console.log(rawData);

      if (!rawData) {
        core.setFailed("Parser produced no JSON output.");
        return;
      }

      const data = JSON.parse(rawData);
      const priority = data.priority?.toLowerCase();

      if (!priority) {
        core.setFailed("Priority not found.");
        return;
      }

      await github.rest.issues.addLabels({
        owner: context.repo.owner,
        repo: context.repo.repo,
        issue_number: context.issue.number,
        labels: [priority]
      });

      console.log(`Applied ${priority}`);