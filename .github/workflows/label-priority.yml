name: Auto Label Priority
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  apply-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Parse Issue Form
        id: parser
        uses: issue-ops/parser@v4
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: bug-report.yaml # Just the filename; it looks inside .github/ISSUE_TEMPLATE automatically

      - name: Apply Priority Label
        uses: actions/github-script@v7
        with:
          script: |
            // The official parser exposes keys via a pre-mapped JSON object
            const issueData = ${{ steps.parser.outputs.json }};
            const priority = issueData.priority; 
            
            if (priority && priority !== '_No response_') {
              console.log(`Applying label: ${priority.toLowerCase()}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [priority.toLowerCase()]
              });
            } else {
              console.log("No valid priority value found.");
            }