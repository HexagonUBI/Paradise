name: Auto Label Priority
on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  apply-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Extract and Apply Priority Label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            if (!body) {
              console.log("Issue body is empty.");
              return;
            }

            // Split body into individual lines and clean them up
            const lines = body.split(/\r?\n/).map(line => line.trim());
            
            // Look for the Markdown header generated by your form's label
            const headingIndex = lines.findIndex(line => line === '### Priority');
            
            if (headingIndex === -1) {
              console.log("Could not find '### Priority' heading in the issue body.");
              return;
            }

            // Find the first non-empty line under the heading
            let priority = null;
            for (let i = headingIndex + 1; i < lines.length; i++) {
              if (lines[i].startsWith('###')) {
                // Stop if we accidentally hit the next form section
                break;
              }
              if (lines[i] && lines[i] !== '_No response_') {
                priority = lines[i].toLowerCase();
                break;
              }
            }

            // Validate that the user selection matches your exact GitHub tags
            const validPriorities = ['critical', 'major', 'minor'];
            
            if (priority && validPriorities.includes(priority)) {
              console.log(`Success! Found priority: "${priority}". Applying native label...`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [priority]
              });
            } else {
              console.log(`No matching priority found. Parsed text was: "${priority}"`);
            }