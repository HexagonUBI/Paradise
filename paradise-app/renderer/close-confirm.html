<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Quit Paradise?</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Segoe UI", Tahoma, Arial, sans-serif;
    background: #fff; color: #1B2733;
    -webkit-user-select: none; user-select: none;
    overflow: hidden;
  }
  body { display: flex; flex-direction: column; }

  .content { flex: 1; display: flex; align-items: flex-start; gap: 14px; padding: 22px 24px 14px; }
  .icon-circle {
    flex-shrink: 0; width: 35px; height: 35px; border-radius: 50%;
    background: #00AFF0; color: #fff; font-weight: 700; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; /* optically centers the circle against the title's cap-height, not its full line-box */
  }
  .text { flex: 1; min-width: 0; }
  .title { font-size: 13.5px; font-weight: 700; line-height: 1.3; margin: 0 0 8px; }
  .desc { font-size: 12.5px; line-height: 1.5; color: #40484f; margin: 0; }
  .remember {
    display: flex; align-items: center; gap: 7px; margin-top: 14px;
    font-size: 12.5px; color: #40484f; cursor: default;
  }
  .remember input { margin: 0; cursor: pointer; }

  .divider { border-top: 1px solid #e4e4e4; }
  .buttons {
    display: flex; justify-content: flex-end; gap: 8px;
    padding: 12px 16px; background: #f3f3f3;
  }
  /* Deliberately NOT hand-styling color/border/background here - an unstyled
     <button> renders as a real native OS control (Windows: system theme,
     correct hover/press states, correct keyboard-focus ring) automatically.
     Only layout (sizing/spacing) is set. All three share one width so they
     read as a single aligned row instead of shrink-wrapping per label. */
  button {
    appearance: auto;
    font-family: inherit; font-size: 12.5px;
    width: 116px; padding: 2px 8px;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="icon-circle">?</div>
    <div class="text">
      <p class="title">Sure you want to quit Paradise?</p>
      <p class="desc">You won&rsquo;t be able to send or receive messages while it&rsquo;s closed. You can minimize it to the tray instead to keep it running in the background.</p>
      <label class="remember"><input type="checkbox" id="remember"> Remember my choice</label>
    </div>
  </div>
  <div class="divider"></div>
  <div class="buttons">
    <button id="btn-tray">Minimize to tray</button>
    <button id="btn-quit">Quit Paradise</button>
    <button id="btn-cancel">Cancel</button>
  </div>

<script>
  const remember = () => document.getElementById('remember').checked;
  document.getElementById('btn-tray').addEventListener('click', () => window.closeConfirmNative.respond('tray', remember()));
  document.getElementById('btn-quit').addEventListener('click', () => window.closeConfirmNative.respond('quit', remember()));
  document.getElementById('btn-cancel').addEventListener('click', () => window.closeConfirmNative.respond('cancel', false));
  document.getElementById('btn-cancel').focus();
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') window.closeConfirmNative.respond('cancel', false);
  });
</script>
</body>
</html>
